"""An ISO 8601-encoded date"""
scalar ISO8601Date

"""An ISO 8601-encoded datetime"""
scalar ISO8601DateTime

"""Autogenerated return type of Login."""
type LoginPayload {
  user: User!
}

"""Autogenerated return type of Logout."""
type LogoutPayload {
  success: Boolean!
}

type Mutation {
  """ログイン（メール・パスワード）"""
  login(email: String!, password: String!): LoginPayload

  """ログアウト（セッション破棄・冪等）"""
  logout: LogoutPayload

  """プレースホルダ"""
  noop: Boolean!

  """新規登録（名前・メール・パスワード）"""
  signUp(name: String!, email: String!, password: String!): SignUpPayload
}

type Query {
  """API 稼働確認用"""
  health: String!

  """ログイン中の一般ユーザー（未認証なら null）"""
  me: User
}

"""Autogenerated return type of SignUp."""
type SignUpPayload {
  user: User!
}

type User {
  createdAt: ISO8601DateTime!
  email: String!
  id: ID!
  lastStudyDate: ISO8601Date
  name: String!
  role: String!

  """連続学習日数"""
  streak: Int!

  """登録単語数（counter_cache）"""
  wordsCount: Int!
}